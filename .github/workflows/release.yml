name: package-release

on:
  push:
    branches:
      - main

  # release:
  #   types: [created]

  workflow_dispatch:
    inputs:
      tags:
        description: "Manual launch"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  TestBuildAndPublish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Read version
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install the project
        run: uv sync --all-extras --group dev --group docs

      - name: Run tests
        run: uv run pytest tests/ --cov=src/ --cov-report=term --cov-fail-under=80 -v

      - name: Build documentation
        run: |
          uv run sphinx-build docs_source docs

      - name: Commit and push documentation
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add docs/*
          git commit -m "Update documentation" || echo "No changes to commit"
          git push origin HEAD

      - name: Build
        run: |
          uv build

      - name: Publish on pypi
        run: |
          uv publish --token ${{ secrets.PYPI_TOKEN }}

      - name: Create and push git tag
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git tag "v${{ steps.version.outputs.version }}" || echo "Tag already exists"
          git push origin "v${{ steps.version.outputs.version }}" || echo "Tag already pushed"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
