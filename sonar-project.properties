# SonarCloud Configuration for Auth Middleware
sonar.projectKey=auth-middleware

# Project metadata
sonar.projectName=Auth Middleware
sonar.projectVersion=1.0.17

sonar.host.url=http://localhost:9000

# Source directories
sonar.sources=src
sonar.tests=tests

# Python version - specify exact version for accurate analysis
sonar.python.version=3.14

# Terraform AWS provider version for accurate analysis
sonar.terraform.provider.aws.version=4.0

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions (aligned with coverage omit settings)
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.pytest_cache/**,\
  **/.mypy_cache/**,\
  **/.ruff_cache/**,\
  .venv/**,\
  htmlcov/**

# Test exclusions
sonar.test.exclusions=tests/**

# Coverage exclusions (aligned with tool.coverage.report)
# sonar.coverage.exclusions=\
#   src/lms/main.py,\
#   src/lms/lambda_main.py,\
#   src/lms/core/telemetry.py,\
#   src/lms/infrastructure/implementations/aws/**

# Encoding
sonar.sourceEncoding=UTF-8
